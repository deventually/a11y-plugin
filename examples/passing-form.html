<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MyApp</title>
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header>
        <nav aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/about">About us</a>
        </nav>
    </header>

    <main id="main">
        <h1>Login</h1>
        <h2>Please sign in to continue</h2>

        <form action="/login" method="post">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" autocomplete="email" required aria-required="true">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required aria-required="true">
            </div>

            <div id="login-error" role="alert" aria-live="assertive"></div>

            <button type="submit">Sign in</button>
        </form>

        <button aria-label="Settings" onclick="openSettings()">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L2 7v10l10 5 10-5V7z"/></svg>
        </button>

        <img src="hero.jpg" alt="Team collaborating in a bright modern office">
        <img src="decoration.png" alt="" role="presentation">

        <table>
            <caption>User accounts</caption>
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Alice</td>
                    <td>alice@example.com</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
